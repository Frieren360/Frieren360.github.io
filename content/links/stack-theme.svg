<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <clipPath id="clip-orange">
      <path d="M0,0 H800 V800 H0 Z M183,128 H500 V578 H183 Z" fill-rule="evenodd"/>
    </clipPath>
    <clipPath id="clip-navy">
      <path d="M0,0 H800 V800 H0 Z M248,175 H565 V625 H248 Z" fill-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="800" height="800" rx="130" fill="#84a59e"/>

  <!-- navy page (bottom) -->
  <rect x="311" y="222" width="317" height="450" rx="22" fill="#364a63" clip-path="url(#clip-navy)"/>

  <!-- orange page (middle) -->
  <rect x="248" y="175" width="317" height="450" rx="22" fill="#f2a160" clip-path="url(#clip-orange)"/>

  <!-- white page (top) -->
  <rect x="183" y="128" width="317" height="450" rx="22" fill="#f7ede3"/>

  <!-- ruled lines: 2px, colour #cac2bb, at y=233,283,333,383,433,483 -->
  <line x1="223" y1="233" x2="460" y2="233" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
  <line x1="223" y1="283" x2="460" y2="283" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
  <line x1="223" y1="333" x2="460" y2="333" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
  <line x1="223" y1="383" x2="460" y2="383" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
  <line x1="223" y1="433" x2="460" y2="433" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
  <line x1="223" y1="483" x2="460" y2="483" stroke="#cac2bb" stroke-width="2" stroke-linecap="round"/>
</svg>
